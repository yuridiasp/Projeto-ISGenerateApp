<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="./css/style.css">
    <title>ISGeA</title>
</head>
<body>
    <div id="messageCopySuccess" class="messageCopy-container">
        <div class="messageCopy successCopy">
            <p>Copiado!</p>
        </div>
    </div>
    <div id="messageCopyError" class="messageCopy-container">
        <div class="messageCopy errorCopy">
            <p>Erro!</p>
        </div>
    </div>
    <div id="loader" class=""></div>
    <div id="report-container" class="hidder">
        <header>
            <h3 id="fileName"></h3>
            <h6 id="filePath" class="truncate-text"></h6>
        </header>
        <div id="report-content"></div>
        <button id="closeReport" disabled>FECHAR</button>
    </div>
    <div class="content">
        <img id="logo" src="../../../assets/logo.png" alt="" srcset="">
        <div>
            <form id="formSplit" action="">
                <label class="dividir" for="inputClassifyPublicationsByDepartment"><i class="fa fa-expand" aria-hidden="true"></i>DIVIDIR ARQUIVO IS</label>
                <input type="button" class="mainOptions" name="inputClassifyPublicationsByDepartment" id="inputClassifyPublicationsByDepartment" style="display: none;">
                <div id="buttonsDivClassifyPublicationsByDepartment" class="buttons">
                    <button id="confirmButtonClassifyPublicationsByDepartmentXLSX" class="xlsx btn-sup" type="button">
                        <i class="fa fa-file-excel-o" aria-hidden="true"></i> EXCEL
                    </button>
                    <button id="confirmButtonClassifyPublicationsByDepartmentDOCX" class="docx btn-sup" type="button">
                        <i class="fa fa-file-word-o" aria-hidden="true"></i> WORD
                    </button>
                    <button id="cancelButtonClassifyPublicationsByDepartment" class="cancel btn-sup" type="reset">
                        CANCELAR
                    </button>
                </div>
            </form>
        </div>
        <div>
            <form id="formRegistrationIS" action="">
                <label class="registrar" for="inputRegisterIntimationsFromAnalyses"><i class="fa fa-pencil-square-o" aria-hidden="true"></i>LANÇAR INTIMAÇÕES</label>
                <input type="button" class="mainOptions" name="inputRegisterIntimationsFromAnalyses" id="inputRegisterIntimationsFromAnalyses" style="display: none;">
                <div id="buttonsDivregisterIntimationsFromAnalyses" class="buttons">
                    <input id="confirmButtonRegisterIntimationsFromAnalyses" class="btn confirm" type="button" value="CONFIRMAR">
                    <input id="cancelButtonRegisterIntimationsFromAnalyses" class="btn cancel" type="reset" value="CANCELAR">
                </div>
            </form>
        </div>
        <div>
            <form id="formValidateAnaliseRegister" action="">
                <label class="validar" for="inputReconcileAnalysesWithSystem"><i class="fa fa-check" aria-hidden="true"></i>VALIDAR ANÁLISE</label>
                <input type="button" class="mainOptions" name="inputReconcileAnalysesWithSystem" id="inputReconcileAnalysesWithSystem" style="display: none;">
                <div id="buttonsDivReconcileAnalysesWithSystem" class="buttons">
                    <input id="confirmButtonReconcileAnalysesWithSystem" class="btn confirm" type="button" value="CONFIRMAR">
                    <input id="cancelButtonReconcileAnalysesWithSystem" class="btn cancel" type="reset" value="CANCELAR">
                </div>
            </form>
        </div>
        <div>
            <form id="formValidateIntimationRegister" action="">
                <label class="validar" for="inputReconcilePublicationsWithSystem"><i class="fa fa-check" aria-hidden="true"></i>VALIDAR CADASTRO</label>
                <input type="button" class="mainOptions" name="inputReconcilePublicationsWithSystem" id="inputReconcilePublicationsWithSystem" style="display: none;">
                <div id="buttonsDivReconcilePublicationsWithSystem" class="buttons">
                    <input id="confirmButtonReconcilePublicationsWithSystem" class="btn confirm" type="button" value="CONFIRMAR">
                    <input id="cancelButtonReconcilePublicationsWithSystem" class="btn cancel" type="reset" value="CANCELAR">
                </div>
            </form>
        </div>
        <div>
            <form id="formCountIntimationsByFolder" action="">
                <label class="validar" for="inputCountIntimationsByFolder"><i class="fa fa-folder-open-o" aria-hidden="true"></i>CONTAR INTIMACOES</label>
                <input type="button" class="mainOptions" name="inputCountIntimationsByFolder" id="inputCountIntimationsByFolder" style="display: none;">
                <div id="buttonsDivCountIntimationsByFolder" class="buttons">
                    <input id="confirmButtonCountIntimationsByFolder" class="btn confirm" type="button" value="CONFIRMAR">
                    <input id="cancelButtonCountIntimationsByFolder" class="btn cancel" type="reset" value="CANCELAR">
                </div>
            </form>
        </div>
        <!-- <div>
            <form id="formAnalise" action="">
                <label class="analisar" style="background: gray; color: darkgrey;" for="analiseIS"><i class="fa fa-search" aria-hidden="true"></i> PRÉ-ANALISAR IS</label>
                <input type="file" name="analiseIS" id="analiseIS" style="display: none;" disabled>
                <div id="analiseBtns" class="buttons">
                    <input class="btn" type="button" value="CONFIRMAR">
                    <input class="btn" type="reset" value="CANCELAR">
                </div>
            </form>
        </div> -->
        <footer>
    
        </footer>
    </div>
    <script>var exports = {};</script>
    <script src="../../../dist/src/renderer/renderer.js"></script>
</body>
</html>
